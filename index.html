<!DOCTYPE html>
<html>
<head>
  <title>Shabaz ganay bila gutay</title>
  <style>
    body {
      background: linear-gradient(to right, #ffdde1, #ee9ca7);
      text-align: center;
      font-family: Arial, sans-serif;
      padding: 50px;
      color: #333;
      overflow: hidden; /* allows hearts and text to float outside the screen */
      position: relative;
    }
    .box {
      background: white;
      padding: 30px;
      border-radius: 20px;
      display: inline-block;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
      max-width: 400px;
      position: relative;
      z-index: 2;
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
      border-radius: 10px;
      border: none;
      background-color: #ff3366;
      color: white;
      cursor: pointer;
    }
    button:hover {
      background-color: #ff6699;
    }
    .heart {
      position: absolute;
      font-size: 24px;
      animation: float 4s linear infinite;
      user-select: none;
      pointer-events: none;
    }
    @keyframes float {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-800px) scale(1.5); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="box">
    <p id="message">Lay Jan! 💖</p>
    <div id="buttons">
      <button onclick="nextMessage()" id="nextBtn">Next ➡️</button>
    </div>
  </div>

  <script>
    const messages = [
      "Loii! 💖",
      "une hurt atah j",
      "une jr sena ki un sukoon ka hurusha ja xum bagair",
      "J buttn hurt amanah bah une chaga xum",
      "thap mo k nuher ayana bah",
      "khair bila huru masla api",
      "aur tay gosas bilum bay 🌸",
      "ja chal echa bah ete gor gayshila , ja akhurum passand gotas bes akaishila?",
      "J hurt amaya bah une chagamin xum ,Shabaz j k haqdar bah shua treatment e",
      "Aur ja Buttn ayarum bah un💕. une gogham bah k gogham bah"
    ];

    let index = 0;

    function nextMessage() {
      index++;
      if (index < messages.length) {
        document.getElementById("message").innerText = messages[index];
        // create multiple hearts for each click
        for(let i=0; i<5; i++) createHeart();
      } else {
        // Last message
        document.getElementById("message").innerText = "dobara hurt acha mu k??";
        document.getElementById("buttons").innerHTML = `
          <button onclick="answer('Yes')">Yes😢</button>
          <button onclick="answer('No')">No🥰</button>
        `;
      }
    }

    function answer(ans) {
      if(ans === 'Yes') {
        document.getElementById("message").innerText = "okay bye";
        document.getElementById("buttons").style.display = "none";
      } else {
        document.getElementById("message").innerText = " Good boy!love you🥰!";
        document.getElementById("buttons").style.display = "none";
      }
    }

    function createHeart() {
      const heart = document.createElement('div');
      heart.className = 'heart';
      heart.style.left = Math.random() * window.innerWidth + 'px';
      heart.style.fontSize = (20 + Math.random() * 30) + 'px';
      heart.style.animationDuration = (2 + Math.random() * 3) + 's';
      const emojis = ['❤️', '💕', '🥰', '😢', '😭'];
      heart.innerText = emojis[Math.floor(Math.random() * emojis.length)];
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 5000);
    }

    // continuously generate gentle floating hearts
    setInterval(() => {
      for(let i=0; i<3; i++) createHeart();
    }, 600);
  </script>

</body>
</html>
